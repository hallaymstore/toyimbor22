<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To'yimBor | Bronlarim va AI tavsiya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="page-body" data-page="dashboard">
    <header class="site-header">
      <div class="shell site-header__inner">
        <a class="brand" href="/">To'yimBor</a>
        <nav class="site-nav">
          <a class="site-nav__link" href="/">Bosh sahifa</a>
          <a class="site-nav__link" href="/catalog">Katalog</a>
          <a class="site-nav__link is-active" href="/dashboard">Bronlarim</a>
          <a class="site-nav__link" href="/profile">Profil</a>
        </nav>
        <div class="site-header__actions">
          <a class="button button--ghost button--small" href="/vendor">Hamkorlar kabineti</a>
        </div>
      </div>
    </header>

    <main class="shell page-main">
      <section class="page-intro">
        <div>
          <p class="eyebrow">Shaxsiy kabinet</p>
          <h1 id="dashboard-title">Bronlarim va AI tavsiya</h1>
          <p class="page-intro__text">
            Tanlangan marosimlar, javob holatlari va didingizga mos jamlanmalar shu yerda ko'rinadi.
          </p>
        </div>
      </section>

      <section id="dashboard-summary" class="stats-grid stats-grid--compact"></section>

      <section class="dashboard-grid">
        <div class="stack-card">
          <div class="section__heading">
            <div>
              <p class="eyebrow">Bronlar</p>
              <h2>Mening buyurtmalarim</h2>
            </div>
          </div>
          <div id="dashboard-bookings" class="booking-list panel-scroll panel-scroll--list"></div>
        </div>

        <div class="glass-card">
          <div class="section__heading">
            <div>
              <p class="eyebrow">To'y tavsiyasi</p>
              <h2>Didingizga mos jamlanmalar</h2>
            </div>
          </div>
          <form id="recommendation-form" class="stack-form">
            <div class="form-grid">
              <label class="field">
                <span>Shahar</span>
                <input name="location" type="text" value="Toshkent" required />
              </label>
              <label class="field">
                <span>Ajratilgan mablag'</span>
                <input name="budget" type="number" value="90000000" required />
              </label>
              <label class="field">
                <span>Mehmonlar</span>
                <input name="guestCount" type="number" value="220" required />
              </label>
              <label class="field">
                <span>Sana</span>
                <input name="eventDate" type="date" />
              </label>
              <label class="field">
                <span>Uslub</span>
                <select name="style">
                  <option value="zamonaviy">Zamonaviy</option>
                  <option value="luxe">Luxe</option>
                  <option value="milliy">Milliy</option>
                  <option value="minimal">Minimal</option>
                </select>
              </label>
            </div>
            <button class="button button--primary button--wide" type="submit">Jamlanmani ko'rish</button>
          </form>
          <div id="recommendation-results" class="package-grid panel-scroll panel-scroll--grid"></div>
        </div>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
