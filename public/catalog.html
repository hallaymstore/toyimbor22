<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To'yimBor | Katalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="page-body" data-page="catalog">
    <header class="site-header">
      <div class="shell site-header__inner">
        <a class="brand" href="/">To'yimBor</a>
        <nav class="site-nav">
          <a class="site-nav__link" href="/">Bosh sahifa</a>
          <a class="site-nav__link is-active" href="/catalog">Katalog</a>
          <a class="site-nav__link" href="/dashboard">Bronlarim</a>
          <a class="site-nav__link" href="/profile">Profil</a>
        </nav>
        <div class="site-header__actions">
          <a class="button button--ghost button--small" href="/vendor">Vendor workspace</a>
        </div>
      </div>
    </header>

    <main class="shell page-main">
      <section class="page-intro">
        <div>
          <p class="eyebrow">Saralangan vendorlar</p>
          <h1>Eksklyuziv to'y xizmatlari katalogi</h1>
          <p class="page-intro__text">
            Editorial kartalar endi real ma'lumot, filtrlash, bron oqimi va moderatsiya bilan ishlaydi.
          </p>
        </div>
      </section>

      <section class="glass-card filter-card">
        <form id="catalog-filter-form" class="search-panel search-panel--catalog">
          <label class="field">
            <span>Qidiruv</span>
            <input id="catalog-q" name="q" type="text" placeholder="Restoran, dekor, foto..." />
          </label>
          <label class="field">
            <span>Shahar</span>
            <input id="catalog-city" name="city" type="text" value="Toshkent" />
          </label>
          <label class="field">
            <span>Kategoriya</span>
            <select id="catalog-category" name="category">
              <option value="">Barchasi</option>
              <option>To'yxona</option>
              <option>Dekor</option>
              <option>Foto & Video</option>
              <option>Catering</option>
              <option>Tashkilotchi</option>
              <option>Musiqa</option>
            </select>
          </label>
          <button class="button button--primary" type="submit">Filtrlash</button>
        </form>
      </section>

      <section class="section">
        <div class="section__heading">
          <div>
            <p class="eyebrow">Natijalar</p>
            <h2>Katalog</h2>
          </div>
          <p id="catalog-count" class="muted-text">0 ta xizmat</p>
        </div>
        <div id="catalog-grid" class="service-grid"></div>
      </section>
    </main>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
